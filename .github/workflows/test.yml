name: test

# Lightweight CI for everyday pushes / PRs: lint + fast unit tests only.
# Heavy packaging happens only on tags (see build.yml).
on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        # No submodule needed: pagespec tests have no upstream dependency.

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run pagespec unit tests
        run: uv run pytest tests/test_pagespec.py -q
